services:
  ollama:
    image: ollama/ollama:latest
    mem_limit: 6g
    container_name: ollama
    ports:
      - "11434:11434"
    entrypoint: [ "/bin/sh", "-c", "ollama serve & sleep 10 && ollama pull llama3.2 && ollama pull mxbai-embed-large && wait" ]
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
  rag:
    container_name: 'rag'
    mem_limit: 4g
    ports:
      - "8000:8000"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    build:
      context: .
    volumes:
      - ./documents:/app/documents
      - chroma_data:/app/chroma_db
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
volumes:
  ollama_data:
  chroma_data:
